services:
  influxdb:
    image: influxdb:2.7
    container_name: q2-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: q2
      DOCKER_INFLUXDB_INIT_BUCKET: logging
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: q2-dev-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  influxdb-data:
  influxdb-config:

